<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Javascript Conditional Statements</h1>

    <input type="text" id="Age" class="form-control" placeholder="type here...">
    <button class="btn btn-info" onclick="checkAge()"></button>

    <script>
        //checkage
        function checkAge(){
        
        var age = document.getElementsById("Age").value;

        if(age < 18){
            alert("you are underage");
        }
        else if (age > 18){
            alert("You are of legal age");
        }
        else {
            alert("Your age could not be classiied.");
        }
        }
    </script>
</body>
</html>
